<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1225">
<title>Coaching Board</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1225;--surface:#141929;--surface2:#1a2035;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.13);
  --accent:#7c6af7;--accent2:#b8a9ff;
  --green:#4ade80;--amber:#fbbf24;--red:#f87171;
  --text:#eeeeff;--muted:rgba(238,238,255,0.42);
  --fh:'Outfit',sans-serif;--fb:'DM Sans',sans-serif;
  --r:12px;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;font-size:15px;line-height:1.6}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 45% at 15% -5%,rgba(124,106,247,0.13) 0%,transparent 60%),radial-gradient(ellipse 50% 35% at 85% 105%,rgba(184,169,255,0.07) 0%,transparent 60%);pointer-events:none;z-index:0}

.wrap{max-width:1000px;margin:0 auto;padding:0 20px 80px;position:relative;z-index:1}

/* HEADER */
header{padding:30px 0 22px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;border-bottom:1px solid var(--border);margin-bottom:28px;flex-wrap:wrap}
.h1{font-family:var(--fh);font-size:clamp(1.4rem,4vw,2rem);font-weight:600;letter-spacing:-0.02em;line-height:1.1}
.h1 span{color:var(--accent2)}
.h-sub{margin-top:4px;color:var(--muted);font-size:13px}
.btn-primary{background:linear-gradient(135deg,var(--accent),#9b8bf5);border:none;border-radius:9px;color:#fff;font-family:var(--fh);font-size:13px;font-weight:700;letter-spacing:.04em;padding:10px 20px;cursor:pointer;transition:opacity .18s,transform .15s;white-space:nowrap}
.btn-primary:hover{opacity:.88}
.btn-primary:active{transform:scale(.97)}

/* COLUMNS */
.board{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:24px;align-items:start}
@media(max-width:640px){.board{grid-template-columns:1fr}}

.col-label{font-family:var(--fh);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}

/* INLINE FORM */
.iform{background:var(--surface);border:1px solid rgba(124,106,247,.3);border-radius:var(--r);padding:20px 22px;margin-bottom:14px;position:relative;overflow:hidden;display:none}
.iform.open{display:block;animation:fu .22s ease}
.iform::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.iform-title{font-family:var(--fh);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent2);margin-bottom:14px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fg.t3{grid-template-columns:1fr 1fr 1fr}
.ff{margin-bottom:10px}
@media(max-width:500px){.fg,.fg.t3{grid-template-columns:1fr}}
label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
input,textarea,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--fb);font-size:16px;padding:8px 11px;outline:none;transition:border-color .2s;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:rgba(238,238,255,.18)}
select option{background:var(--surface2)}
textarea{resize:vertical;min-height:72px}
.fa{display:flex;gap:8px;margin-top:12px}
.btn-sub{flex:2;background:linear-gradient(135deg,var(--accent),#9b8bf5);border:none;border-radius:7px;color:#fff;font-family:var(--fh);font-size:13px;font-weight:700;padding:10px;cursor:pointer;transition:opacity .18s}
.btn-sub:hover{opacity:.88}
.btn-cx{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:var(--fb);font-size:13px;padding:10px;cursor:pointer}

/* CARDS */
.cards{display:flex;flex-direction:column;gap:9px}
.card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--r);padding:16px 18px;animation:fu .25s ease both;transition:border-color .18s}
.card:hover{border-color:rgba(124,106,247,.3);border-left-color:var(--accent)}
.card.done{border-left-color:var(--green);opacity:.5}
.card.taken{border-left-color:var(--amber)}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

.c-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px}
.c-name{font-family:var(--fh);font-weight:700;font-size:14px}
.c-time{font-size:11px;color:var(--muted)}
.badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:99px}
.b-open{background:rgba(124,106,247,.15);color:var(--accent2)}
.b-taken{background:rgba(251,191,36,.13);color:var(--amber)}
.b-done{background:rgba(74,222,128,.12);color:var(--green)}
.b-plan{background:rgba(124,106,247,.15);color:var(--accent2)}

.c-topic{font-size:13px;font-weight:500;margin-bottom:3px}
.c-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:8px}

.c-bot{border-top:1px solid var(--border);padding-top:9px;margin-top:8px}
.c-meta{font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.c-meta strong{color:var(--amber)}
.c-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}

.btn-sm{border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--fb);font-size:12px;font-weight:500;padding:5px 12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-sm:hover{border-color:var(--accent);color:var(--accent2)}
.btn-take{background:rgba(124,106,247,.12);border-color:rgba(124,106,247,.3);color:var(--accent2)}
.btn-take:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-done{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.25);color:var(--green)}
.btn-done:hover{background:var(--green);border-color:var(--green);color:#000}
.btn-del{color:var(--muted)}
.btn-del:hover{border-color:var(--red);color:var(--red);background:rgba(248,113,113,.07)}
.btn-edit{color:var(--amber);border-color:rgba(251,191,36,.25);background:rgba(251,191,36,.07)}
.btn-edit:hover{background:rgba(251,191,36,.18);border-color:var(--amber)}

/* PARTICIPANTS */
.p-sec{margin-top:9px;padding-top:9px;border-top:1px solid var(--border)}
.p-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.p-list{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:2px 8px 2px 11px;font-size:12px}
.chip-x{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;line-height:1;padding:0 2px;transition:color .13s}
.chip-x:hover{color:var(--red)}
.join-row{display:flex;gap:6px;align-items:center}
.join-inp{flex:1;max-width:180px;font-size:13px!important;padding:6px 9px!important}
.btn-join{background:rgba(124,106,247,.15);border:1px solid rgba(124,106,247,.3);border-radius:7px;color:var(--accent2);font-family:var(--fb);font-size:12px;font-weight:500;padding:6px 13px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-join:hover{background:var(--accent);border-color:var(--accent);color:#fff}

/* MODAL */
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;padding:20px}
.moverlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;width:100%;max-width:400px}
.modal h3{font-family:var(--fh);font-size:.95rem;font-weight:700;margin-bottom:14px}
.m-act{display:flex;gap:8px;margin-top:14px}
.btn-mcx{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:var(--fb);font-size:13px;padding:10px;cursor:pointer}
.btn-mok{flex:2;background:linear-gradient(135deg,var(--accent),#9b8bf5);border:none;border-radius:7px;color:#fff;font-family:var(--fh);font-size:13px;font-weight:700;padding:10px;cursor:pointer}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface);border:1px solid rgba(74,222,128,.3);border-radius:10px;padding:10px 18px;color:var(--green);font-size:13px;display:flex;align-items:center;gap:7px;opacity:0;pointer-events:none;transition:all .28s;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* EMPTY */
.empty{text-align:center;padding:48px 16px;color:var(--muted)}
.empty svg{opacity:.16;margin:0 auto 10px;display:block}
.empty p{font-size:13px}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="h1">Coaching <span>Board</span></div>
      <div class="h-sub">Request support or offer a session — open to everyone.</div>
    </div>
    <button class="btn-primary" onclick="openRequestForm()">&#43; Request Coaching</button>
  </header>

  <!-- REQUEST FORM (global, above board) -->
  <div class="iform" id="req-form">
    <div class="iform-title">New Coaching Request</div>
    <div class="fg">
      <div>
        <label for="rq-name">Your Name</label>
        <input type="text" id="rq-name" placeholder="Jane Doe" autocomplete="off">
      </div>
      <div>
        <label for="rq-topic">Topic</label>
        <input type="text" id="rq-topic" placeholder="What do you need help with?" autocomplete="off">
      </div>
    </div>
    <div class="ff">
      <label for="rq-desc">Description</label>
      <textarea id="rq-desc" placeholder="Describe what you're working on and what kind of support would help..."></textarea>
    </div>
    <div class="fa">
      <button class="btn-cx" onclick="closeRequestForm()">Cancel</button>
      <button class="btn-sub" onclick="submitRequest()">Submit Request</button>
    </div>
  </div>

  <!-- BOARD -->
  <div class="board">

    <!-- LEFT: Requests -->
    <div>
      <div class="col-label">Request for Coaching</div>
      <div class="cards" id="req-list"></div>
    </div>

    <!-- RIGHT: Sessions -->
    <div>
      <div class="col-label">
        Planned Sessions
        <button class="btn-sm" style="font-size:11px;padding:4px 11px" onclick="toggleForm('ses-form')">&#43; New Session</button>
      </div>

      <div class="iform" id="ses-form">
        <div class="iform-title">Propose a Session</div>
        <div class="fg">
          <div>
            <label for="ss-coach">Coach / Host</label>
            <input type="text" id="ss-coach" placeholder="Your name" autocomplete="off">
          </div>
          <div>
            <label for="ss-title">Session Title</label>
            <input type="text" id="ss-title" placeholder="e.g. Intro to Prompt Engineering" autocomplete="off">
          </div>
        </div>
        <div class="fg t3">
          <div>
            <label for="ss-date">Date</label>
            <input type="date" id="ss-date">
          </div>
          <div>
            <label for="ss-time">Time</label>
            <input type="time" id="ss-time">
          </div>
          <div>
            <label for="ss-room">Room</label>
            <select id="ss-room">
              <option value="">&#8212; select &#8212;</option>
              <option value="Remote Option">Remote Option</option>
              <option value="Remote Only">Remote Only</option>
              <option value="Community Room">Community Room</option>
            </select>
          </div>
        </div>
        <div class="ff">
          <label for="ss-link">Teams Link (optional)</label>
          <input type="url" id="ss-link" placeholder="https://teams.microsoft.com/..." autocomplete="off">
        </div>
        <div class="ff">
          <label for="ss-desc">Description</label>
          <textarea id="ss-desc" placeholder="What will you cover? Who is it for?"></textarea>
        </div>
        <div class="fa">
          <button class="btn-cx" onclick="toggleForm('ses-form')">Cancel</button>
          <button class="btn-sub" onclick="submitSession()">Propose Session</button>
        </div>
      </div>

      <div class="cards" id="ses-list"></div>
    </div>

  </div>
</div>

<!-- TAKE MODAL -->
<div class="moverlay" id="take-modal" onclick="if(event.target===this)closeModal('take-modal')">
  <div class="modal">
    <h3>Take this Request</h3>
    <div class="fg t3" style="margin-bottom:10px">
      <div>
        <label for="m-date">Date</label>
        <input type="date" id="m-date">
      </div>
      <div>
        <label for="m-time">Time</label>
        <input type="time" id="m-time">
      </div>
      <div>
        <label for="m-room">Room</label>
        <select id="m-room">
          <option value="">&#8212; select &#8212;</option>
          <option value="Remote Option">Remote Option</option>
          <option value="Remote Only">Remote Only</option>
          <option value="Community Room">Community Room</option>
        </select>
      </div>
    </div>
    <div class="ff">
      <label for="m-coach">Your Name (Coach)</label>
      <input type="text" id="m-coach" placeholder="Your name" autocomplete="off">
    </div>
    <div class="m-act">
      <button class="btn-mcx" onclick="closeModal('take-modal')">Cancel</button>
      <button class="btn-mok" onclick="confirmTake()">Take it</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="moverlay" id="edit-modal" onclick="if(event.target===this)closeModal('edit-modal')">
  <div class="modal">
    <h3>Edit Session Details</h3>
    <div class="fg t3" style="margin-bottom:10px">
      <div>
        <label for="e-date">Date</label>
        <input type="date" id="e-date">
      </div>
      <div>
        <label for="e-time">Time</label>
        <input type="time" id="e-time">
      </div>
      <div>
        <label for="e-room">Room</label>
        <select id="e-room">
          <option value="">&#8212; select &#8212;</option>
          <option value="Remote Option">Remote Option</option>
          <option value="Remote Only">Remote Only</option>
          <option value="Community Room">Community Room</option>
        </select>
      </div>
    </div>
    <div class="ff">
      <label for="e-coach">Coach Name</label>
      <input type="text" id="e-coach" placeholder="Coach name" autocomplete="off">
    </div>
    <div class="m-act">
      <button class="btn-mcx" onclick="closeModal('edit-modal')">Cancel</button>
      <button class="btn-mok" onclick="confirmEdit()">Save</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <svg width="15" height="15" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M8 12l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <span id="toast-msg"></span>
</div>

<script>
const KEY = 'cbv3';
let D = {requests:[], sessions:[]};
let pendingTake = null;
let pendingEdit = null;

function load(){
  try{ D = JSON.parse(localStorage.getItem(KEY)) || {requests:[],sessions:[]}; }
  catch{ D = {requests:[],sessions:[]}; }
  if(!D.requests) D.requests=[];
  if(!D.sessions) D.sessions=[];
}
function save(){ localStorage.setItem(KEY, JSON.stringify(D)); }

function timeAgo(ts){
  const d = Math.floor((Date.now()-ts)/60000);
  if(d<1) return 'just now';
  if(d<60) return d+'m ago';
  const h=Math.floor(d/60);
  if(h<24) return h+'h ago';
  return new Date(ts).toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
}

function fmtDT(date,time){
  if(!date) return '';
  const d = new Date(date+(time?'T'+time:'T00:00'));
  return d.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short'})+(time?' &middot; '+time:'');
}

function toast(msg){
  const el=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2600);
}

function openRequestForm(){
  const f=document.getElementById('req-form');
  f.classList.add('open');
  f.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function closeRequestForm(){ document.getElementById('req-form').classList.remove('open'); }
function toggleForm(id){ document.getElementById(id).classList.toggle('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

// ── REQUESTS ──
function submitRequest(){
  const name=document.getElementById('rq-name').value.trim();
  const topic=document.getElementById('rq-topic').value.trim();
  const desc=document.getElementById('rq-desc').value.trim();
  document.getElementById('rq-name').style.borderColor=name?'':'var(--red)';
  document.getElementById('rq-topic').style.borderColor=topic?'':'var(--red)';
  if(!name||!topic) return;
  D.requests.unshift({id:Date.now().toString(),name,topic,desc,status:'open',coach:null,date:'',time:'',room:'',ts:Date.now()});
  save(); renderRequests();
  ['rq-name','rq-topic','rq-desc'].forEach(i=>document.getElementById(i).value='');
  closeRequestForm();
  toast('Request submitted!');
}

function takeRequest(id){
  pendingTake=id;
  ['m-coach','m-date','m-time'].forEach(i=>{ document.getElementById(i).value=''; document.getElementById(i).style.borderColor=''; });
  document.getElementById('m-room').value='';
  document.getElementById('take-modal').classList.add('open');
  setTimeout(()=>document.getElementById('m-date').focus(),80);
}

function confirmTake(){
  const coach=document.getElementById('m-coach').value.trim();
  document.getElementById('m-coach').style.borderColor=coach?'':'var(--red)';
  if(!coach) return;
  const r=D.requests.find(x=>x.id===pendingTake);
  if(r){
    r.status='taken';
    r.coach=coach;
    r.date=document.getElementById('m-date').value;
    r.time=document.getElementById('m-time').value;
    r.room=document.getElementById('m-room').value;
    save(); renderRequests();
  }
  closeModal('take-modal');
  toast('Request taken!');
}

function editRequest(id){
  pendingEdit=id;
  const r=D.requests.find(x=>x.id===id);
  if(!r) return;
  document.getElementById('e-coach').value=r.coach||'';
  document.getElementById('e-date').value=r.date||'';
  document.getElementById('e-time').value=r.time||'';
  document.getElementById('e-room').value=r.room||'';
  document.getElementById('edit-modal').classList.add('open');
}

function confirmEdit(){
  const coach=document.getElementById('e-coach').value.trim();
  document.getElementById('e-coach').style.borderColor=coach?'':'var(--red)';
  if(!coach) return;
  const r=D.requests.find(x=>x.id===pendingEdit);
  if(r){
    r.coach=coach;
    r.date=document.getElementById('e-date').value;
    r.time=document.getElementById('e-time').value;
    r.room=document.getElementById('e-room').value;
    save(); renderRequests();
  }
  closeModal('edit-modal');
  toast('Details updated!');
}

function markDone(id){
  const r=D.requests.find(x=>x.id===id);
  if(r){ r.status='done'; save(); renderRequests(); toast('Marked as done \u2713'); }
}

function deleteRequest(id){
  D.requests=D.requests.filter(x=>x.id!==id);
  save(); renderRequests();
}

function renderRequests(){
  const list=document.getElementById('req-list');
  if(!D.requests.length){
    list.innerHTML='<div class="empty"><svg width="40" height="40" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M8 12h8M8 8h5M8 16h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><p>No requests yet.</p></div>';
    return;
  }
  list.innerHTML=D.requests.map(r=>{
    const sl={open:'b-open',taken:'b-taken',done:'b-done'};
    const st={open:'Open',taken:'Taken',done:'Done'};
    let meta='', btns='';
    if(r.status==='taken'||r.status==='done'){
      const parts=[];
      if(r.coach) parts.push('Coach: <strong>'+r.coach+'</strong>');
      if(r.room)  parts.push('&#x1F4CD; '+r.room);
      if(r.date||r.time) parts.push('&#x1F4C5; '+fmtDT(r.date,r.time));
      if(parts.length) meta='<div class="c-meta">'+parts.map(p=>'<span>'+p+'</span>').join('')+'</div>';
    }
    if(r.status==='open'){
      btns='<button class="btn-sm btn-take" onclick="takeRequest(\''+r.id+'\')">Take it</button>'
          +'<button class="btn-sm btn-del" onclick="deleteRequest(\''+r.id+'\')">Delete</button>';
    } else if(r.status==='taken'){
      btns='<button class="btn-sm btn-edit" onclick="editRequest(\''+r.id+'\')">Edit</button>'
          +'<button class="btn-sm btn-done" onclick="markDone(\''+r.id+'\')">Mark Done</button>'
          +'<button class="btn-sm btn-del" onclick="deleteRequest(\''+r.id+'\')">Delete</button>';
    } else {
      btns='<button class="btn-sm btn-del" onclick="deleteRequest(\''+r.id+'\')">Remove</button>';
    }
    return '<div class="card '+r.status+'">'
      +'<div class="c-top"><span class="c-name">'+r.name+'</span><span class="c-time">'+timeAgo(r.ts)+'</span><span class="badge '+sl[r.status]+'">'+st[r.status]+'</span></div>'
      +'<div class="c-topic">'+r.topic+'</div>'
      +(r.desc?'<div class="c-desc">'+r.desc+'</div>':'')
      +'<div class="c-bot">'+meta+'<div class="c-btns">'+btns+'</div></div>'
      +'</div>';
  }).join('');
}

// ── SESSIONS ──
function submitSession(){
  const coach=document.getElementById('ss-coach').value.trim();
  const title=document.getElementById('ss-title').value.trim();
  document.getElementById('ss-coach').style.borderColor=coach?'':'var(--red)';
  document.getElementById('ss-title').style.borderColor=title?'':'var(--red)';
  if(!coach||!title) return;
  D.sessions.unshift({
    id:Date.now().toString(),coach,title,
    date:document.getElementById('ss-date').value,
    time:document.getElementById('ss-time').value,
    room:document.getElementById('ss-room').value,
    link:document.getElementById('ss-link').value.trim(),
    desc:document.getElementById('ss-desc').value.trim(),
    participants:[],ts:Date.now()
  });
  save(); renderSessions();
  ['ss-coach','ss-title','ss-date','ss-time','ss-link','ss-desc'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('ss-room').value='';
  toggleForm('ses-form');
  toast('Session proposed!');
}

function joinSession(id){
  const inp=document.getElementById('ji-'+id);
  const name=inp.value.trim();
  if(!name){ inp.style.borderColor='var(--red)'; return; }
  inp.style.borderColor='';
  const s=D.sessions.find(x=>x.id===id);
  if(s&&s.participants.indexOf(name)===-1){ s.participants.push(name); save(); renderSessions(); toast(name+' joined!'); }
  else if(s) inp.style.borderColor='var(--amber)';
}

function removeP(sid,name){
  const s=D.sessions.find(x=>x.id===sid);
  if(s){ s.participants=s.participants.filter(p=>p!==name); save(); renderSessions(); }
}

function deleteSession(id){
  D.sessions=D.sessions.filter(x=>x.id!==id);
  save(); renderSessions();
}

function renderSessions(){
  const list=document.getElementById('ses-list');
  if(!D.sessions.length){
    list.innerHTML='<div class="empty"><svg width="40" height="40" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><p>No sessions yet.</p></div>';
    return;
  }
  list.innerHTML=D.sessions.map(s=>{
    const chips=s.participants.map(p=>'<span class="chip">'+p+'<button class="chip-x" onclick="removeP(\''+s.id+'\',\''+p.replace(/'/g,"\\'")+'\')">&times;</button></span>').join('');
    const meta=[];
    if(s.date||s.time) meta.push('<span>&#x1F4C5; '+fmtDT(s.date,s.time)+'</span>');
    if(s.room) meta.push('<span>&#x1F4CD; '+s.room+'</span>');
    if(s.link) meta.push('<span>&#x1F4BB; <a href="'+s.link+'" target="_blank" style="color:var(--accent2)">Join Teams Call</a></span>');
    return '<div class="card">'
      +'<div class="c-top"><span class="c-name">'+s.title+'</span><span class="badge b-plan">Planned</span></div>'
      +'<div class="c-desc" style="margin-bottom:4px"><span style="color:var(--amber);font-size:12px">&#x1F464; '+s.coach+'</span>'+(s.desc?'<div style="margin-top:3px">'+s.desc+'</div>':'')+'</div>'
      +(meta.length?'<div class="c-meta" style="margin-bottom:6px">'+meta.join('')+'</div>':'')
      +'<div class="c-bot">'
      +'<div class="p-sec"><div class="p-lbl">Interested ('+s.participants.length+')</div>'
      +(s.participants.length?'<div class="p-list">'+chips+'</div>':'')
      +'<div class="join-row"><input class="join-inp" id="ji-'+s.id+'" type="text" placeholder="Your name..." autocomplete="off" onkeydown="if(event.key===\'Enter\')joinSession(\''+s.id+'\')">'
      +'<button class="btn-join" onclick="joinSession(\''+s.id+'\')">Join</button></div></div>'
      +'<div class="c-btns" style="margin-top:8px"><button class="btn-sm btn-del" onclick="deleteSession(\''+s.id+'\')">Delete</button></div>'
      +'</div></div>';
  }).join('');
}

load(); renderRequests(); renderSessions();
setInterval(()=>{ load(); renderRequests(); renderSessions(); },15000);
</script>
