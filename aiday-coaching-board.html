<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1225">
<title>Coaching Board</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1225;
  --surface: #141929;
  --surface2: #1a2035;
  --border: rgba(255,255,255,0.08);
  --accent: #7c6af7;
  --accent2: #b8a9ff;
  --green: #4ade80;
  --amber: #fbbf24;
  --red: #f87171;
  --text: #eeeeff;
  --muted: rgba(238,238,255,0.42);
  --font-head: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --radius: 12px;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 45% at 15% -5%, rgba(124,106,247,0.13) 0%, transparent 60%),
    radial-gradient(ellipse 50% 35% at 85% 105%, rgba(184,169,255,0.07) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 20px 80px;
  position: relative;
  z-index: 1;
}

/* HEADER */
header {
  padding: 32px 0 24px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.header-left h1 {
  font-family: var(--font-head);
  font-size: clamp(1.5rem, 5vw, 2.2rem);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.1;
}
.header-left h1 span { color: var(--accent2); }
.header-left p { margin-top: 5px; color: var(--muted); font-size: 13px; }

.stats { display: flex; gap: 20px; flex-shrink: 0; }
.stat { text-align: right; }
.stat-num { font-family: var(--font-head); font-size: 1.5rem; font-weight: 700; color: var(--accent2); line-height: 1; }
.stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

/* TABS */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 4px;
  width: fit-content;
}
.tab-btn {
  background: transparent;
  border: none;
  border-radius: 7px;
  color: var(--muted);
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 8px 20px;
  cursor: pointer;
  transition: all 0.18s;
}
.tab-btn.active { background: var(--accent); color: #fff; }

/* SECTION BAR */
.section-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 10px;
}
.section-label {
  font-family: var(--font-head);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}
.btn-new {
  background: linear-gradient(135deg, var(--accent), #9b8bf5);
  border: none;
  border-radius: 9px;
  color: #fff;
  font-family: var(--font-head);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 8px 16px;
  cursor: pointer;
  transition: opacity 0.18s, transform 0.15s;
}
.btn-new:hover { opacity: 0.88; }
.btn-new:active { transform: scale(0.97); }

/* INLINE FORM */
.inline-form {
  background: var(--surface);
  border: 1px solid rgba(124,106,247,0.3);
  border-radius: var(--radius);
  padding: 22px 24px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
  display: none;
}
.inline-form.open { display: block; animation: fadeUp 0.25s ease; }
.inline-form::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}
.inline-form h3 {
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--accent2);
  margin-bottom: 16px;
}

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-grid.thirds { grid-template-columns: 1fr 1fr 1fr; }
.form-full { margin-bottom: 12px; }

@media (max-width: 580px) {
  .form-grid, .form-grid.thirds { grid-template-columns: 1fr; }
}

label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }

input, textarea, select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 16px;
  padding: 9px 12px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
input::placeholder, textarea::placeholder { color: rgba(238,238,255,0.18); }
select option { background: var(--surface2); }
textarea { resize: vertical; min-height: 80px; }

.form-actions { display: flex; gap: 10px; margin-top: 14px; }
.btn-submit {
  flex: 2;
  background: linear-gradient(135deg, var(--accent), #9b8bf5);
  border: none; border-radius: 8px; color: #fff;
  font-family: var(--font-head); font-size: 14px; font-weight: 700;
  padding: 11px; cursor: pointer; transition: opacity 0.18s;
}
.btn-submit:hover { opacity: 0.88; }
.btn-cancel-form {
  flex: 1;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--muted);
  font-family: var(--font-body); font-size: 14px; padding: 11px; cursor: pointer;
}

/* CARDS */
.cards-list { display: flex; flex-direction: column; gap: 10px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius);
  padding: 18px 20px;
  animation: fadeUp 0.28s ease both;
  transition: border-color 0.2s;
}
.card:hover { border-color: rgba(124,106,247,0.3); border-left-color: var(--accent); }
.card.status-taken { border-left-color: var(--amber); }
.card.status-done  { border-left-color: var(--green); opacity: 0.55; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
.card-title-row { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
.card-name { font-family: var(--font-head); font-weight: 700; font-size: 15px; }
.card-time { font-size: 11px; color: var(--muted); }

.badge {
  display: inline-block;
  font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; padding: 3px 9px; border-radius: 99px;
}
.badge-open    { background: rgba(124,106,247,0.15); color: var(--accent2); }
.badge-taken   { background: rgba(251,191,36,0.13);  color: var(--amber); }
.badge-done    { background: rgba(74,222,128,0.12);  color: var(--green); }
.badge-planned { background: rgba(124,106,247,0.15); color: var(--accent2); }

.card-topic { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.card-desc  { font-size: 13px; color: var(--muted); line-height: 1.5; }

.card-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.card-meta-info { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--muted); flex: 1; min-width: 0; }
.card-meta-info span { display: flex; align-items: center; gap: 6px; }
.card-meta-info a { color: var(--accent2); text-decoration: none; }
.card-meta-info a:hover { text-decoration: underline; }

.card-btns { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

.btn-sm {
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 12px;
  cursor: pointer;
  transition: all 0.16s;
  white-space: nowrap;
}
.btn-sm:hover { border-color: var(--accent); color: var(--accent2); }
.btn-take { background: rgba(124,106,247,0.12); border-color: rgba(124,106,247,0.3); color: var(--accent2); }
.btn-take:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-done { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.25); color: var(--green); }
.btn-done:hover { background: var(--green); border-color: var(--green); color: #000; }
.btn-del { color: var(--muted); }
.btn-del:hover { border-color: var(--red); color: var(--red); background: rgba(248,113,113,0.07); }

/* PARTICIPANTS */
.participants-section {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.participants-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 8px;
}
.participants-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }

.participant-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 3px 8px 3px 12px;
  font-size: 12px;
  color: var(--text);
}
.chip-remove {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px;
  transition: color 0.15s;
}
.chip-remove:hover { color: var(--red); }

.join-row { display: flex; gap: 7px; align-items: center; }
.join-input {
  flex: 1; max-width: 200px;
  font-size: 13px !important;
  padding: 7px 10px !important;
}
.btn-join {
  background: rgba(124,106,247,0.15);
  border: 1px solid rgba(124,106,247,0.3);
  border-radius: 7px;
  color: var(--accent2);
  font-family: var(--font-body);
  font-size: 12px; font-weight: 500;
  padding: 7px 14px;
  cursor: pointer;
  transition: all 0.16s;
  white-space: nowrap;
}
.btn-join:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

/* FILTERS */
.filters { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 16px; }
.filter-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 99px;
  color: var(--muted);
  font-family: var(--font-body);
  font-size: 12px;
  padding: 5px 15px;
  cursor: pointer;
  transition: all 0.18s;
}
.filter-btn.active, .filter-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(4px);
  z-index: 100;
  align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 26px; width: 100%; max-width: 380px;
}
.modal h3 { font-family: var(--font-head); font-size: 1rem; font-weight: 700; margin-bottom: 14px; }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; }
.btn-modal-cancel {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--muted); font-family: var(--font-body); font-size: 13px; padding: 10px; cursor: pointer;
}
.btn-modal-confirm {
  flex: 2; background: linear-gradient(135deg, var(--accent), #9b8bf5);
  border: none; border-radius: 8px; color: #fff;
  font-family: var(--font-head); font-size: 13px; font-weight: 700; padding: 10px; cursor: pointer;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface);
  border: 1px solid rgba(74,222,128,0.3);
  border-radius: 10px; padding: 11px 20px;
  color: var(--green); font-size: 13px;
  display: flex; align-items: center; gap: 8px;
  opacity: 0; pointer-events: none;
  transition: all 0.3s; z-index: 200; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* EMPTY */
.empty-state { text-align: center; padding: 56px 20px; color: var(--muted); }
.empty-state svg { opacity: 0.18; margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto; }
.empty-state p { font-size: 14px; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-left">
      <h1>Coaching <span>Board</span></h1>
      <p>Request support or offer a session — open to everyone.</p>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="stat-requests">0</div>
        <div class="stat-label">Open</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-sessions">0</div>
        <div class="stat-label">Sessions</div>
      </div>
    </div>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('requests', this)">Support Requests</button>
    <button class="tab-btn" onclick="switchTab('sessions', this)">Sessions</button>
  </div>

  <!-- ═══ TAB: REQUESTS ═══ -->
  <div id="tab-requests">
    <div class="section-bar">
      <div class="section-label">All Requests</div>
      <button class="btn-new" onclick="toggleForm('req-form')">+ New Request</button>
    </div>

    <div class="inline-form" id="req-form">
      <h3>New Support Request</h3>
      <div class="form-grid">
        <div>
          <label for="req-name">Your Name</label>
          <input type="text" id="req-name" placeholder="Jane Doe" autocomplete="off">
        </div>
        <div>
          <label for="req-topic">Topic</label>
          <input type="text" id="req-topic" placeholder="What do you need help with?" autocomplete="off">
        </div>
      </div>
      <div class="form-full">
        <label for="req-desc">Description</label>
        <textarea id="req-desc" placeholder="Describe what you're working on and what kind of support would help..."></textarea>
      </div>
      <div class="form-actions">
        <button class="btn-cancel-form" onclick="toggleForm('req-form')">Cancel</button>
        <button class="btn-submit" onclick="submitRequest()">Submit Request</button>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setReqFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setReqFilter('open', this)">Open</button>
      <button class="filter-btn" onclick="setReqFilter('taken', this)">In Progress</button>
      <button class="filter-btn" onclick="setReqFilter('done', this)">Done</button>
    </div>

    <div class="cards-list" id="req-list"></div>
  </div>

  <!-- ═══ TAB: SESSIONS ═══ -->
  <div id="tab-sessions" style="display:none">
    <div class="section-bar">
      <div class="section-label">Planned Sessions</div>
      <button class="btn-new" onclick="toggleForm('ses-form')">+ Request new Session</button>
    </div>

    <div class="inline-form" id="ses-form">
      <h3>Propose a Session</h3>
      <div class="form-grid">
        <div>
          <label for="ses-coach">Coach / Host</label>
          <input type="text" id="ses-coach" placeholder="Your name" autocomplete="off">
        </div>
        <div>
          <label for="ses-title">Session Title</label>
          <input type="text" id="ses-title" placeholder="e.g. Intro to Prompt Engineering" autocomplete="off">
        </div>
      </div>
      <div class="form-grid thirds">
        <div>
          <label for="ses-date">Date</label>
          <input type="date" id="ses-date">
        </div>
        <div>
          <label for="ses-time">Time</label>
          <input type="time" id="ses-time">
        </div>
        <div>
          <label for="ses-room">Room</label>
          <select id="ses-room">
            <option value="">&#8212; select &#8212;</option>
            <option value="Remote Option">Remote Option</option>
            <option value="Remote Only">Remote Only</option>
            <option value="Community Room">Community Room</option>
          </select>
        </div>
      </div>
      <div class="form-full">
        <label for="ses-link">Teams Link (optional)</label>
        <input type="url" id="ses-link" placeholder="https://teams.microsoft.com/..." autocomplete="off">
      </div>
      <div class="form-full">
        <label for="ses-desc">Description</label>
        <textarea id="ses-desc" placeholder="What will you cover? Who is it for?"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn-cancel-form" onclick="toggleForm('ses-form')">Cancel</button>
        <button class="btn-submit" onclick="submitSession()">Propose Session</button>
      </div>
    </div>

    <div class="cards-list" id="ses-list"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>Take this Request</h3>
    <div>
      <label for="modal-coach">Your Name (Coach)</label>
      <input type="text" id="modal-coach" placeholder="Your name" autocomplete="off">
    </div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-modal-confirm" onclick="confirmTake()">Take it</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M8 12l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <span id="toast-msg">Done!</span>
</div>

<script>
const STORAGE_KEY = 'coachingboard_v2';
let data = { requests: [], sessions: [] };
let reqFilter = 'all';
let pendingTakeId = null;

function load() {
  try { data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { requests: [], sessions: [] }; }
  catch { data = { requests: [], sessions: [] }; }
  if (!data.requests) data.requests = [];
  if (!data.sessions) data.sessions = [];
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function formatTime(ts) {
  const d = new Date(ts), now = new Date();
  const diff = Math.floor((now - d) / 60000);
  if (diff < 1) return 'just now';
  if (diff < 60) return diff + 'm ago';
  const h = Math.floor(diff / 60);
  if (h < 24) return h + 'h ago';
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
}

function formatDateTime(date, time) {
  if (!date) return '';
  const d = new Date(date + (time ? 'T' + time : 'T00:00'));
  return d.toLocaleDateString('en-GB', { weekday: 'short', day: '2-digit', month: 'short' })
    + (time ? ' &middot; ' + time : '');
}

function toast(msg) {
  const el = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

function toggleForm(id) {
  document.getElementById(id).classList.toggle('open');
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-requests').style.display = tab === 'requests' ? '' : 'none';
  document.getElementById('tab-sessions').style.display  = tab === 'sessions'  ? '' : 'none';
}

function setReqFilter(f, btn) {
  reqFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderRequests();
}

// REQUESTS
function submitRequest() {
  const name  = document.getElementById('req-name').value.trim();
  const topic = document.getElementById('req-topic').value.trim();
  const desc  = document.getElementById('req-desc').value.trim();
  document.getElementById('req-name').style.borderColor  = name  ? '' : 'var(--red)';
  document.getElementById('req-topic').style.borderColor = topic ? '' : 'var(--red)';
  if (!name || !topic) return;
  data.requests.unshift({ id: Date.now().toString(), name, topic, desc, status: 'open', coach: null, ts: Date.now() });
  save(); renderRequests(); updateStats();
  ['req-name','req-topic','req-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('req-form').classList.remove('open');
  toast('Request submitted!');
}

function takeRequest(id) {
  pendingTakeId = id;
  document.getElementById('modal-coach').value = '';
  document.getElementById('modal-coach').style.borderColor = '';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('modal-coach').focus(), 80);
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  pendingTakeId = null;
}
function confirmTake() {
  const coach = document.getElementById('modal-coach').value.trim();
  document.getElementById('modal-coach').style.borderColor = coach ? '' : 'var(--red)';
  if (!coach) return;
  const req = data.requests.find(r => r.id === pendingTakeId);
  if (req) { req.status = 'taken'; req.coach = coach; save(); renderRequests(); updateStats(); }
  closeModal(); toast('Request taken!');
}
function markDone(id) {
  const req = data.requests.find(r => r.id === id);
  if (req) { req.status = 'done'; save(); renderRequests(); updateStats(); toast('Marked as done \u2713'); }
}
function deleteRequest(id) {
  data.requests = data.requests.filter(r => r.id !== id);
  save(); renderRequests(); updateStats();
}

function renderRequests() {
  const list = document.getElementById('req-list');
  const filtered = reqFilter === 'all' ? data.requests : data.requests.filter(r => r.status === reqFilter);
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><svg width="44" height="44" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M8 12h8M8 8h5M8 16h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><p>No requests here yet.</p></div>';
    return;
  }
  const statusLabel = { open: 'Open', taken: 'In Progress', done: 'Done' };
  const badgeClass  = { open: 'badge-open', taken: 'badge-taken', done: 'badge-done' };
  list.innerHTML = filtered.map(req => {
    const actions = req.status === 'open'
      ? '<button class="btn-sm btn-take" onclick="takeRequest(\''+req.id+'\')">Take it</button><button class="btn-sm btn-del" onclick="deleteRequest(\''+req.id+'\')">Delete</button>'
      : req.status === 'taken'
      ? '<button class="btn-sm btn-done" onclick="markDone(\''+req.id+'\')">Mark Done &#x2713;</button><button class="btn-sm btn-del" onclick="deleteRequest(\''+req.id+'\')">Delete</button>'
      : '<button class="btn-sm btn-del" onclick="deleteRequest(\''+req.id+'\')">Remove</button>';
    const coachLine = req.coach ? '<span>&#x1F4CB; Coach: <strong style="color:var(--amber)">'+req.coach+'</strong></span>' : '';
    return '<div class="card status-'+req.status+'"><div class="card-header"><div class="card-title-row"><span class="card-name">'+req.name+'</span><span class="card-time">'+formatTime(req.ts)+'</span><span class="badge '+badgeClass[req.status]+'">'+statusLabel[req.status]+'</span></div></div><div class="card-topic">'+req.topic+'</div>'+(req.desc?'<div class="card-desc">'+req.desc+'</div>':'')+'<div class="card-bottom"><div class="card-meta-info">'+coachLine+'</div><div class="card-btns">'+actions+'</div></div></div>';
  }).join('');
}

// SESSIONS
function submitSession() {
  const coach = document.getElementById('ses-coach').value.trim();
  const title = document.getElementById('ses-title').value.trim();
  document.getElementById('ses-coach').style.borderColor = coach ? '' : 'var(--red)';
  document.getElementById('ses-title').style.borderColor = title ? '' : 'var(--red)';
  if (!coach || !title) return;
  data.sessions.unshift({
    id: Date.now().toString(),
    coach, title,
    date:  document.getElementById('ses-date').value,
    time:  document.getElementById('ses-time').value,
    room:  document.getElementById('ses-room').value,
    link:  document.getElementById('ses-link').value.trim(),
    desc:  document.getElementById('ses-desc').value.trim(),
    participants: [],
    ts: Date.now()
  });
  save(); renderSessions(); updateStats();
  ['ses-coach','ses-title','ses-date','ses-time','ses-link','ses-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('ses-room').value = '';
  document.getElementById('ses-form').classList.remove('open');
  toast('Session proposed!');
}

function joinSession(id) {
  const input = document.getElementById('join-' + id);
  const name = input.value.trim();
  if (!name) { input.style.borderColor = 'var(--red)'; return; }
  input.style.borderColor = '';
  const ses = data.sessions.find(s => s.id === id);
  if (ses) {
    if (ses.participants.indexOf(name) === -1) {
      ses.participants.push(name);
      save(); renderSessions(); toast(name + ' joined!');
    } else {
      input.style.borderColor = 'var(--amber)';
    }
  }
}

function removeParticipant(sessionId, name) {
  const ses = data.sessions.find(s => s.id === sessionId);
  if (ses) { ses.participants = ses.participants.filter(p => p !== name); save(); renderSessions(); }
}

function deleteSession(id) {
  data.sessions = data.sessions.filter(s => s.id !== id);
  save(); renderSessions(); updateStats();
}

function renderSessions() {
  const list = document.getElementById('ses-list');
  if (!data.sessions.length) {
    list.innerHTML = '<div class="empty-state"><svg width="44" height="44" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><p>No sessions proposed yet.</p></div>';
    return;
  }
  list.innerHTML = data.sessions.map(ses => {
    const chips = ses.participants.map(function(p) {
      return '<span class="participant-chip">' + p + '<button class="chip-remove" onclick="removeParticipant(\'' + ses.id + '\',\'' + p.replace(/'/g,"\\'") + '\')" title="Remove">&times;</button></span>';
    }).join('');
    const dateStr = (ses.date || ses.time) ? '<span>&#x1F4C5; ' + formatDateTime(ses.date, ses.time) + '</span>' : '';
    const roomStr = ses.room ? '<span>&#x1F4CD; ' + ses.room + '</span>' : '';
    const linkStr = ses.link ? '<span>&#x1F4BB; <a href="' + ses.link + '" target="_blank">Join Teams Call</a></span>' : '';
    return '<div class="card">'
      + '<div class="card-header"><div class="card-title-row"><span class="card-name">' + ses.title + '</span><span class="badge badge-planned">Planned</span></div></div>'
      + '<div class="card-desc" style="margin-bottom:0"><span style="color:var(--amber);font-size:12px">&#x1F464; ' + ses.coach + '</span>'
      + (ses.desc ? '<div style="margin-top:5px;color:var(--muted)">' + ses.desc + '</div>' : '') + '</div>'
      + '<div class="card-bottom"><div class="card-meta-info">' + dateStr + roomStr + linkStr + '</div>'
      + '<div class="card-btns"><button class="btn-sm btn-del" onclick="deleteSession(\'' + ses.id + '\')">Delete</button></div></div>'
      + '<div class="participants-section"><div class="participants-label">Interested (' + ses.participants.length + ')</div>'
      + (ses.participants.length ? '<div class="participants-list">' + chips + '</div>' : '')
      + '<div class="join-row"><input class="join-input" id="join-' + ses.id + '" type="text" placeholder="Your name..." autocomplete="off" onkeydown="if(event.key===\'Enter\')joinSession(\'' + ses.id + '\')"><button class="btn-join" onclick="joinSession(\'' + ses.id + '\')">Join</button></div>'
      + '</div></div>';
  }).join('');
}

function updateStats() {
  document.getElementById('stat-requests').textContent = data.requests.filter(r => r.status === 'open').length;
  document.getElementById('stat-sessions').textContent = data.sessions.length;
}

load(); renderRequests(); renderSessions(); updateStats();
setInterval(function() { load(); renderRequests(); renderSessions(); updateStats(); }, 15000);
</script>
</body>
</html>
